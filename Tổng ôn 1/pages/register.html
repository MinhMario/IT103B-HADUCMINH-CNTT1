<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../style/register.css">
</head>
<body>
    <h1>Trang đăng ký</h1>
    <!-- Trang đăng ký dự án thương mại điện tử 
     1.Lưu danh sách User :local storage;
     2.Danh sách user cần mảng để chứa
     3.Từng user là 1 object
     +ID
     +NAME
     +PASSWORD
     +Email
     -->
     <form action="">
        <span>Tên người dùng</span>
        <input type="text" id="username"><br>
        <p class="error-name"></p>
        <span >Email</span>
        <input type="text" id="email"><br>
        <p class="error-email"></p>
        <span>Mật khẩu</span>
        <input type="text" id="password"><br>
        <p class="error-pass"></p>
        <span>Xác nhận mật khẩu</span>
        <input type="text" id="repass"><br>
        <p class="confirm-pass">Mật khẩu không trùng khớp</p>
        <button id="btn-add" onclick="register(event)">Đăng ký</button>
     </form>
     <script src="../js/register.js"></script>
</body>
</html>
