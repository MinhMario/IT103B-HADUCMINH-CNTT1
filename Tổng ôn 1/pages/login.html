<body>
    <h1>Trang đăng nhập</h1>
     <form action="">

        <input type="text" id="email"><br>

        <span>Mật khẩu</span>
        <input type="text" id="password"><br>
        <p class="error-login">Tên đăng nhập hoặc mật khẩu không đúng</p>
        <button id="btn-add" onclick="login(event)">Đăng nhập</button>
        <p>Bạn chưa co tài khoản,<a href="./register.html">Đăng ký</a></p>
     </form>
     <script src="../js/login.js"></script>
